<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>From Assessment Data to Patient-Ready Reports</title>
    <meta name="description" content="Public case study showing how assessment data was turned into longitudinal analysis, multilingual summaries, and patient-ready reports.">
    <meta property="og:title" content="From Assessment Data to Patient-Ready Reports">
    <meta property="og:description" content="Clinical reporting workflow collateral focused on analysis, charts, multilingual output, and delivery-ready documents.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 96 96'%3E%3Crect width='96' height='96' rx='22' fill='%2346527d'/%3E%3Cpath d='M24 28h21c14 0 24 8 24 20S59 68 45 68H24V28zm14 28h8c7 0 12-3 12-8s-5-8-12-8h-8v16z' fill='%23f6f3ff'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="../../shared/case-study.css?v=4">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <article class="hero-panel">
          <div class="eyebrow" data-project-eyebrow></div>
          <h1 data-project-title></h1>
          <p data-project-lead></p>
          <figure class="hero-visual" data-project-hero-visual hidden>
            <img data-project-hero-image src="" alt="">
            <figcaption data-project-hero-caption></figcaption>
          </figure>
          <div class="hero-tags" data-project-tags></div>
        </article>
        <aside class="meta-panel">
          <section class="meta-block">
            <h2>Project signals</h2>
            <div class="signal-list" data-project-signals></div>
          </section>
          <section class="meta-block">
            <h2>At a glance</h2>
            <div class="metric-grid" data-metric-grid></div>
          </section>
          <section class="meta-block">
            <h2>Client voice</h2>
            <div data-project-quote></div>
          </section>
        </aside>
      </section>

      <section class="presentation-shell">
        <aside class="slide-nav">
          <h3>Presentation flow</h3>
          <div class="slide-index" data-slide-index></div>
        </aside>

        <section class="slide-canvas">
          <div class="controls">
            <div class="control-buttons">
              <button class="btn btn-accent" type="button" data-action="autoplay">Stop audio/guided mode</button>
              <button class="btn" type="button" data-action="prev">Previous</button>
              <button class="btn" type="button" data-action="next">Next</button>
            </div>
            <div class="progress-meta">
              <div class="progress-rail"><div class="progress-fill" data-progress-fill></div></div>
              <div class="progress-copy" data-progress-copy></div>
            </div>
          </div>

          <div data-slide-canvas></div>
        </section>
      </section>

      <footer class="footer-panel">
        <div><strong>Workflow pattern:</strong> assessment data to patient-ready reporting</div>
        <div data-footer-note></div>
      </footer>
    </main>

    <script src="./case-study-data.js"></script>
    <script src="../../shared/case-study.js?v=4"></script>
  </body>
</html>
